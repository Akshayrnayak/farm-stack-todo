[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://CURRENTLY_PENDING_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force = true

# Catch-all for React Router SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
